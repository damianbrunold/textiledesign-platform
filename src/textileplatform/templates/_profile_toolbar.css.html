<style>
{# Shared toolbar + pattern-row styles for the user profile pages.
   Compact view has been retired — only Detail and Thumbnails remain. #}

#profile-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: stretch;
    margin: 0.2rem 0 0.6rem 0;
}
#profile-toolbar .button {
    display: inline-flex;
    align-items: center;
    padding: 0 0.7rem;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #f6f6f6;
    height: 1.9rem;
    box-sizing: border-box;
}
#profile-toolbar .button a { text-decoration: none; color: inherit; }
.toolbar-spacer { flex: 1; }
#filter-input {
    height: 1.9rem;
    padding: 0 0.5rem;
    width: 18rem;
    border: 1px solid #ccc;
    border-radius: 3px;
    box-sizing: border-box;
    background: #fff;
    color: inherit;
    font: inherit;
    margin: 0;
    vertical-align: top;
}
.view-modes, .sort-modes {
    display: inline-flex;
    align-items: stretch;
    border: 1px solid #ccc;
    border-radius: 3px;
    overflow: hidden;
    height: 1.9rem;
    box-sizing: border-box;
}
.view-modes button, .sort-modes button {
    display: inline-flex;
    align-items: center;
    padding: 0 0.7rem;
    border: 0;
    background: #f6f6f6;
    color: inherit;
    cursor: pointer;
    border-right: 1px solid #ccc;
    font: inherit;
    box-sizing: border-box;
}
.view-modes button:last-child, .sort-modes button:last-child {
    border-right: 0;
}
.view-modes button.active, .sort-modes button.active {
    background: #cae6f6;
    color: #000;
    font-weight: bold;
}

.patterns-section { margin-top: 1rem; }
.section-title {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 0.3rem;
}

.pattern-row {
    display: grid;
    gap: 0.5rem;
    align-items: center;
    padding: 0.2rem 0.3rem;
    border-bottom: 1px solid #eee;
}
.pattern-row .row-name a {
    text-decoration: none;
    color: inherit;
}
.pattern-row .row-name a:hover { text-decoration: underline; }
.pattern-row .row-meta {
    font-size: 0.85em;
    color: #777;
    display: none;
}
.pattern-row .row-actions {
    display: flex;
    gap: 0.25rem;
}
.pattern-row .row-actions button,
.pattern-row .row-actions a.icon {
    border: 1px solid #ccc;
    background: #fff;
    color: inherit;
    padding: 0.05rem 0.4rem;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.85em;
    text-decoration: none;
}
.pattern-row .row-actions a.icon:hover,
.pattern-row .row-actions button:hover { background: #f0f0f0; }
.pattern-row .thumb-link { display: none; }
.pattern-row .thumb {
    background: #fafafa;
    border: 1px solid #ddd;
}
.pattern-row.is-public .pub-tag::before {
    content: "● ";
    color: #2a7;
    font-size: 0.85em;
}

/* ----- Detail view ----- */
.view-detail .pattern-row .row-meta { display: contents; }
.view-detail .pattern-row .row-meta > span { color: #555; }

/* ----- Thumbnails view ----- */
.view-thumb .patterns-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
}
.view-thumb .pattern-row {
    display: block;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 0.4rem;
    background: #fafafa;
}
.view-thumb .pattern-row .thumb-link {
    display: block;
    margin-bottom: 0.4rem;
}
.view-thumb .pattern-row .thumb {
    display: block;
    width: 100%;
    aspect-ratio: 2 / 1;
    background: #fff;
    border: 1px solid #ccc;
    object-fit: contain;
}
.view-thumb .pattern-row .row-name {
    font-weight: bold;
    margin-bottom: 0.2rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.view-thumb .pattern-row .row-meta {
    display: block;
    font-size: 0.8em;
    color: #666;
}
.view-thumb .pattern-row .row-actions {
    margin-top: 0.4rem;
}

.rename-input {
    width: 100%;
    box-sizing: border-box;
    padding: 0.15rem 0.3rem;
    font: inherit;
}
.empty-note { color: #888; padding: 0.5rem; }

{% if g.user and g.user.darkmode %}
#profile-toolbar .button,
.view-modes button, .sort-modes button {
    background: #2a2a2a;
    border-color: #555;
    color: #ddd;
}
.view-modes, .sort-modes,
#filter-input,
#profile-toolbar .button { border-color: #555; }
.view-modes button, .sort-modes button { border-right-color: #555; }
.view-modes button.active, .sort-modes button.active {
    background: #4a6c80;
    color: #fff;
}
#filter-input { background: #1f1f1f; color: #ddd; }
.pattern-row { border-bottom-color: #333; }
.pattern-row:hover { background: #2a2a2a; }
.view-thumb .pattern-row { background: #1f1f1f; border-color: #444; }
.view-thumb .pattern-row .thumb { background: #111; border-color: #555; }
.pattern-row .row-actions button,
.pattern-row .row-actions a.icon {
    background: #333; border-color: #555; color: #ddd;
}
.pattern-row .row-actions a.icon:hover,
.pattern-row .row-actions button:hover { background: #444; }
{% else %}
.pattern-row:hover { background: #f5f9fc; }
{% endif %}

{# Two grid templates parameterised by whether action column is present. #}
.view-detail .pattern-row.has-actions {
    grid-template-columns: 1.4fr 0.7fr 0.7fr 1fr 1fr 0.7fr 0.7fr auto;
}
.view-detail .pattern-row:not(.has-actions) {
    grid-template-columns: 1.4fr 0.7fr 0.7fr 1fr 1fr 0.7fr 0.7fr;
}
</style>
