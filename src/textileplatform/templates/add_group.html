{% extends 'base.html' %}

{% block title %}{{ gettext('Add Group') }} &mdash; {{ gettext('Textile Platform') }}{% endblock %}

{% block header %}
    <h1>{{ gettext('Add Group') }}</h1>
{% endblock %}

{% block content %}
<div class="card card-form">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
            <label for="grp-name">{{ gettext('Group Name') }}</label>
            <input type="text" id="grp-name" name="name" required aria-required="true" value="{{ request.form.get('name', '') }}"/>
        </div>
        <div class="field">
            <label for="grp-desc">{{ gettext('Group Description') }}</label>
            <textarea id="grp-desc" name="description" rows="4" class="group-description-input">{{ request.form.get('description', '') }}</textarea>
        </div>
        <div class="actions left">
            <button type="submit" class="btn primary">{{ gettext('Save') }}</button>
        </div>
    </form>
</div>
{% endblock %}
