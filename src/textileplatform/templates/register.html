{% extends 'base.html' %}

{% block title %}{{ gettext('Create Account') }} &mdash; {{ gettext('Textile Platform') }}{% endblock %}

{% block header %}
<h1>{{ gettext('Create Account') }}</h1>
{% endblock %}

{% block content %}
<div class="card card-form">
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
            <label for="name">{{ gettext('Name') }}</label>
            <input type="text" name="name" id="name" required aria-required="true" autocomplete="username" value="{{ request.form['name'] }}">
        </div>
        <div class="field">
            <label for="email">{{ gettext('E-Mail') }}</label>
            <input type="email" name="email" id="email" required aria-required="true" autocomplete="email" value="{{ request.form['email'] }}">
        </div>
        <div class="field">
            <label for="password">{{ gettext('Password') }}</label>
            <input type="password" name="password" id="password" required aria-required="true" autocomplete="new-password">
        </div>
        <div class="field">
            <label for="confirm_password">{{ gettext('Confirm Password') }}</label>
            <input type="password" name="confirm_password" id="confirm_password" required aria-required="true" autocomplete="new-password">
        </div>
        <div class="field">
            <label for="x">{{ gettext('Please enter the result of the following calculation') }} {{ captcha_question }}</label>
            <input type="text" name="x" id="x" required aria-required="true" autocomplete="off" inputmode="numeric" value=""/>
        </div>
        <div class="actions left">
            <button type="submit" class="btn primary">{{ gettext('Create') }}</button>
        </div>
    </form>
</div>
{% endblock %}
