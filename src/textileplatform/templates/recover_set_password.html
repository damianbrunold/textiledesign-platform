{% extends 'base.html' %}

{% block title %}{{ gettext('Reset Password') }} &mdash; {{ gettext('Textile Platform') }}{% endblock %}

{% block header %}
    <h1>{{ gettext('Reset Password') }}</h1>
{% endblock %}

{% block content %}
<div class="card card-form">
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <p>{{ gettext('Please choose a new password for your account.') }}</p>
        <div class="field">
            <label for="password">{{ gettext('Password') }}</label>
            <input name="password" id="password" type="password" required aria-required="true" autocomplete="new-password">
        </div>
        <div class="field">
            <label for="confirm_password">{{ gettext('Confirm Password') }}</label>
            <input name="confirm_password" id="confirm_password" type="password" required aria-required="true" autocomplete="new-password">
        </div>
        <div class="actions left">
            <button type="submit" class="btn primary">{{ gettext('Save') }}</button>
        </div>
    </form>
</div>
{% endblock %}
