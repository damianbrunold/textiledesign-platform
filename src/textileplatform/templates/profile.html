{% extends 'base.html' %}

{% block header %}
<h1>{{ gettext('Profile') }}</h1>
{% endblock %}

{% block content %}
<style>
#email {
    width: 30rem;   
}
#save {
    width: 6rem;
}
</style>
  <form id="profile-form" method="post">
    <label for="email">{{ gettext('E-Mail') }}</label>
    <input name="email" id="email" required value="{{ user.email }}">
    <div class="mode-toggle">
        <button type="button" id="btn-light" class="mode-btn {% if user.darkmode is sameas false %}active{% endif %}">{{ gettext('Light') }}</button>
        <button type="button" id="btn-dark" class="mode-btn {% if user.darkmode is sameas true %}active{% endif %}">{{ gettext('Dark') }}</button>
        <button type="button" id="btn-system" class="mode-btn {% if user.darkmode is none %}active{% endif %}">{{ gettext('System') }}</button>
        <input type="hidden" name="darkmode" id="darkmode-value" value="{% if user.darkmode is sameas true %}1{% elif user.darkmode is sameas false %}0{% else %}auto{% endif %}">
    </div>
    <div class="block-invitations">
        <label>
            <input type="checkbox" name="block_invitations" value="1"
                   {% if user.block_invitations %}checked{% endif %}>
            {{ gettext('Block invitations and direct messages from other users') }}
        </label>
    </div>
    <button id="save">{{ gettext('Save') }}</button>
  </form>
  <div><a class="button" href="{{ url_for('logout') }}">{{ gettext('Log out') }}</a></div>
  <script>
      document.getElementById("save").addEventListener("click", e => {
        document.getElementById("profile-form").submit();
      });
      const darkStyleUrl = "{{ url_for('static', filename='css/style_dark.css') }}";
      function setDarkMode(mode) {
          // mode: 'light' | 'dark' | 'system'
          let link = document.getElementById('dark-stylesheet');
          if (link) link.remove();
          if (mode === 'dark') {
              link = document.createElement('link');
              link.rel = 'stylesheet';
              link.id = 'dark-stylesheet';
              link.href = darkStyleUrl;
              document.head.appendChild(link);
          } else if (mode === 'system') {
              link = document.createElement('link');
              link.rel = 'stylesheet';
              link.id = 'dark-stylesheet';
              link.href = darkStyleUrl;
              link.media = '(prefers-color-scheme: dark)';
              document.head.appendChild(link);
          }
          const value = mode === 'dark' ? '1' : (mode === 'light' ? '0' : 'auto');
          document.getElementById('darkmode-value').value = value;
          document.getElementById('btn-light').classList.toggle('active', mode === 'light');
          document.getElementById('btn-dark').classList.toggle('active', mode === 'dark');
          document.getElementById('btn-system').classList.toggle('active', mode === 'system');
      }
      document.getElementById('btn-light').addEventListener('click', () => setDarkMode('light'));
      document.getElementById('btn-dark').addEventListener('click', () => setDarkMode('dark'));
      document.getElementById('btn-system').addEventListener('click', () => setDarkMode('system'));
  </script>
{% endblock %}
