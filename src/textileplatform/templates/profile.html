{% extends 'base.html' %}

{% block header %}
<h1>{{ gettext('Profile') }}</h1>
{% endblock %}

{% block content %}
<style>
#email {
    width: 30rem;   
}
#save {
    width: 6rem;
}
</style>
  <form id="profile-form" method="post">
    <label for="email">{{ gettext('E-Mail') }}</label>
    <input name="email" id="email" required value="{{ user.email }}">
    <div class="mode-toggle">
        <button type="button" id="btn-light" class="mode-btn {% if not user.darkmode %}active{% endif %}">{{ gettext('Light') }}</button>
        <button type="button" id="btn-dark" class="mode-btn {% if user.darkmode %}active{% endif %}">{{ gettext('Dark') }}</button>
        <input type="hidden" name="darkmode" id="darkmode-value" value="{{ '1' if user.darkmode else '' }}">
    </div>
    <div class="block-invitations">
        <label>
            <input type="checkbox" name="block_invitations" value="1"
                   {% if user.block_invitations %}checked{% endif %}>
            {{ gettext('Block invitations and direct messages from other users') }}
        </label>
    </div>
    <button id="save">{{ gettext('Save') }}</button>
  </form>
  <div><a class="button" href="{{ url_for('logout') }}">{{ gettext('Log out') }}</a></div>
  <script>
      document.getElementById("save").addEventListener("click", e => {
        document.getElementById("profile-form").submit();
      });
      const darkStyleUrl = "{{ url_for('static', filename='css/style_dark.css') }}";
      function setDarkMode(enabled) {
          let link = document.getElementById('dark-stylesheet');
          if (enabled && !link) {
              link = document.createElement('link');
              link.rel = 'stylesheet';
              link.id = 'dark-stylesheet';
              link.href = darkStyleUrl;
              document.head.appendChild(link);
          } else if (!enabled && link) {
              link.remove();
          }
          document.getElementById('darkmode-value').value = enabled ? '1' : '';
          document.getElementById('btn-light').classList.toggle('active', !enabled);
          document.getElementById('btn-dark').classList.toggle('active', enabled);
      }
      document.getElementById('btn-light').addEventListener('click', () => setDarkMode(false));
      document.getElementById('btn-dark').addEventListener('click', () => setDarkMode(true));
  </script>
{% endblock %}
